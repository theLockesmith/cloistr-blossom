stages:
  - test
  - build
  - sync

variables:
  GO_VERSION: "1.23"
  CONTAINER_REGISTRY: registry.coldforge.xyz
  CONTAINER_IMAGE: ${CONTAINER_REGISTRY}/coldforge/coldforge-blossom

# Cache Go modules between jobs
.go-cache: &go-cache
  cache:
    key: go-modules
    paths:
      - .go/pkg/mod/
    policy: pull-push

# Test stage - run on all branches
test:
  stage: test
  image: golang:${GO_VERSION}
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  script:
    - go mod download
    - go test -v -race ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"

# Build stage - build binary
build:
  stage: build
  image: golang:${GO_VERSION}
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
    CGO_ENABLED: "1"
  script:
    - go mod download
    - go build -o blossom ./cmd/blossom
  artifacts:
    paths:
      - blossom
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"

# Build container image
container:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CONTAINER_REGISTRY
  script:
    - docker build -t ${CONTAINER_IMAGE}:${CI_COMMIT_SHA} .
    - docker tag ${CONTAINER_IMAGE}:${CI_COMMIT_SHA} ${CONTAINER_IMAGE}:latest
    - docker push ${CONTAINER_IMAGE}:${CI_COMMIT_SHA}
    - docker push ${CONTAINER_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"

# Tagged releases
container-release:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CONTAINER_REGISTRY
  script:
    - docker build -t ${CONTAINER_IMAGE}:${CI_COMMIT_TAG} .
    - docker push ${CONTAINER_IMAGE}:${CI_COMMIT_TAG}
  rules:
    - if: $CI_COMMIT_TAG

# Sync with upstream (manual trigger)
sync-upstream:
  stage: sync
  image: alpine/git
  variables:
    GIT_STRATEGY: clone
  before_script:
    - git config --global user.email "ci@coldforge.xyz"
    - git config --global user.name "Coldforge CI"
  script:
    - git remote add upstream https://github.com/sebdeveloper6952/blossom-server.git || true
    - git fetch upstream
    - git checkout master
    - git merge upstream/master --no-edit || echo "Merge conflict - manual resolution required"
    - git push origin master
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  allow_failure: true
