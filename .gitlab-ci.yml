stages:
  - test
  - build
  - docker
  - sync

variables:
  GO_VERSION: "1.25"

# Cache Go modules between jobs
.go-cache: &go-cache
  cache:
    key: go-modules-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
    policy: pull-push

# Test stage - run on all branches
test:
  stage: test
  image: golang:${GO_VERSION}-bookworm
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
    CGO_ENABLED: "1"
  before_script:
    - apt-get update && apt-get install -y gcc libc6-dev
  script:
    - go mod download
    - go test -v ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"

# Build stage - build binary
build:
  stage: build
  image: golang:${GO_VERSION}-bookworm
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
    CGO_ENABLED: "1"
  before_script:
    - apt-get update && apt-get install -y gcc libc6-dev
  script:
    - go mod download
    - go build -o blossom ./cmd/api
  artifacts:
    paths:
      - blossom
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"

# Docker build - build and push container image
docker:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
      --destination ${CI_REGISTRY_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"

# Sync with upstream (manual trigger)
sync-upstream:
  stage: sync
  image: alpine/git
  variables:
    GIT_STRATEGY: clone
  before_script:
    - git config --global user.email "ci@coldforge.xyz"
    - git config --global user.name "Coldforge CI"
  script:
    - git remote add upstream https://github.com/sebdeveloper6952/blossom-server.git || true
    - git fetch upstream
    - git checkout master
    - git merge upstream/master --no-edit || echo "Merge conflict - manual resolution required"
    - git push origin master
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  allow_failure: true
