# Database configuration
# Supported drivers: "sqlite" (default), "postgres"
database:
  driver: sqlite
  sqlite:
    path: "db/database.sqlite3"
  # postgres:
  #   host: localhost
  #   port: 5432
  #   user: blossom
  #   password: ${POSTGRES_PASSWORD}
  #   database: blossom
  #   ssl_mode: prefer

# Legacy field - use database.sqlite.path instead (backwards compatible)
db_path: "db/database.sqlite3"

# Storage backend configuration
# Supported backends: "local" (default), "s3"
storage:
  backend: local
  local:
    path: "data/blobs"
  # s3:
  #   endpoint: https://s3.example.com  # S3-compatible endpoint
  #   bucket: blossom
  #   region: us-east-1
  #   access_key: ${S3_ACCESS_KEY}
  #   secret_key: ${S3_SECRET_KEY}
  #   path_style: true  # Required for MinIO/Ceph

# Cache configuration (optional)
# Connect to Redis or Dragonfly for shared caching across replicas.
# If not configured, an in-memory cache is used (per-process, not shared).
# cache:
#   url: "redis://dragonfly.dragonfly.svc.cluster.local:6379"
#   ttl: 3600  # Default TTL in seconds (0 = no expiration)

# Storage quota configuration
quota:
  enabled: false
  default_bytes: 1073741824    # 1 GB default quota
  max_bytes: 107374182400      # 100 GB max quota
  warn_threshold: 80           # Warn at 80% usage

# Server-side encryption at rest (optional)
# When enabled, all blobs are encrypted with AES-256-GCM before storage.
# encryption:
#   enabled: true
#   master_key: ${ENCRYPTION_MASTER_KEY}  # 32-byte hex (generate: openssl rand -hex 32)

# CDN integration (optional)
# Configure content delivery for better performance and reduced bandwidth costs.
# Supports Cloudflare R2, AWS CloudFront, or any S3-compatible CDN.
# cdn:
#   enabled: true
#
#   # Public URL for direct CDN access (e.g., https://cdn.example.com)
#   # Used when bucket is publicly accessible via CDN
#   public_url: "https://cdn.example.com"
#
#   # Use presigned URLs for private bucket access
#   # Generates time-limited signed URLs for secure downloads
#   presigned_urls: false
#
#   # Presigned URL expiry duration (e.g., "1h", "24h", "7d")
#   # Default: 1h
#   presigned_expiry: "1h"
#
#   # Redirect to CDN instead of proxying content
#   # true: Returns 302 redirect to CDN URL (saves bandwidth)
#   # false: Proxies content through the API (maintains control)
#   redirect: true
#
#   # Cache-Control header for CDN-served content
#   # Default: "public, max-age=31536000" (1 year for immutable content)
#   cache_control: "public, max-age=31536000"

# Log level, adjust accordingly.
log_level: "TRACE"

# Address where server will be listening.
api_addr: "0.0.0.0:8000"

# URL that will be used as the base for the URL to serve files.
#
# This setting is meant to be tweaked if you are running the server
# behind a reverse proxy (like nginx) and you want a subdomain.
# You could set it to: `https://my.domain.com` and then the files
# would be served at `https://my.domain.com/<hash>`
cdn_url: "http://0.0.0.0:8000"

# Admin pubkey
admin_pubkey: "509f37d850fa007227688f2d897e8e8efb6af9a4b2bd636bbd74349f9f2c6d89"

# Limit the size of files that can be uploaded, specified in bytes.
# Default value of 2MB
max_upload_size_bytes: 2097152

# Control the behavior of the Blossom server.
# Available actions:
# - 'ALLOW'
# - 'DENY'
#
# Available resources:
# - 'UPLOAD': upload a file to the server
# - 'GET': get a file from the server
# - 'DELETE': delete a file from the server
# - 'LIST': list the files of a pubkey
# - 'MIRROR': upload a file from another Blossom server
#
# Available pubkey options:
# - 'ALL': rule applies to any pubkey
# - '<specific-pubkey>': rule applies to only one pubkey
access_control_rules:
  - action: "ALLOW"
    pubkey: "ALL"
    resource: "UPLOAD"
  - action: "ALLOW"
    pubkey: "ALL"
    resource: "GET"

# Control the type of files that are accepted by the server.
# For the supported types, check: https://github.com/gabriel-vasile/mimetype/blob/master/supported_mimes.md
# 
# To allow any mime-type, only set one rule:
# - *
allowed_mime_types:
  - image/jpeg
  - image/png
