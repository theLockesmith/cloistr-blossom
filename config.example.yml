# Database configuration
# Supported drivers: "sqlite" (default), "postgres"
database:
  driver: sqlite
  sqlite:
    path: "db/database.sqlite3"
  # postgres:
  #   host: localhost
  #   port: 5432
  #   user: blossom
  #   password: ${POSTGRES_PASSWORD}
  #   database: blossom
  #   ssl_mode: prefer

# Legacy field - use database.sqlite.path instead (backwards compatible)
db_path: "db/database.sqlite3"

# Storage backend configuration
# Supported backends: "local" (default), "s3"
storage:
  backend: local
  local:
    path: "data/blobs"
  # s3:
  #   endpoint: https://s3.example.com  # S3-compatible endpoint
  #   bucket: blossom
  #   region: us-east-1
  #   access_key: ${S3_ACCESS_KEY}
  #   secret_key: ${S3_SECRET_KEY}
  #   path_style: true  # Required for MinIO/Ceph

# Cache configuration (optional)
# Connect to Redis or Dragonfly for shared caching across replicas.
# If not configured, an in-memory cache is used (per-process, not shared).
# cache:
#   url: "redis://dragonfly.dragonfly.svc.cluster.local:6379"
#   ttl: 3600  # Default TTL in seconds (0 = no expiration)

# Storage quota configuration
quota:
  enabled: false
  default_bytes: 1073741824    # 1 GB default quota
  max_bytes: 107374182400      # 100 GB max quota
  warn_threshold: 80           # Warn at 80% usage

# Server-side encryption at rest (optional)
# When enabled, all blobs are encrypted with AES-256-GCM before storage.
# encryption:
#   enabled: true
#   master_key: ${ENCRYPTION_MASTER_KEY}  # 32-byte hex (generate: openssl rand -hex 32)

# CDN integration (optional)
# Configure content delivery for better performance and reduced bandwidth costs.
# Supports Cloudflare R2, AWS CloudFront, or any S3-compatible CDN.
# cdn:
#   enabled: true
#
#   # Public URL for direct CDN access (e.g., https://cdn.example.com)
#   # Used when bucket is publicly accessible via CDN
#   public_url: "https://cdn.example.com"
#
#   # Use presigned URLs for private bucket access
#   # Generates time-limited signed URLs for secure downloads
#   presigned_urls: false
#
#   # Presigned URL expiry duration (e.g., "1h", "24h", "7d")
#   # Default: 1h
#   presigned_expiry: "1h"
#
#   # Redirect to CDN instead of proxying content
#   # true: Returns 302 redirect to CDN URL (saves bandwidth)
#   # false: Proxies content through the API (maintains control)
#   redirect: true
#
#   # Cache-Control header for CDN-served content
#   # Default: "public, max-age=31536000" (1 year for immutable content)
#   cache_control: "public, max-age=31536000"

# Rate limiting (optional)
# Protect against abuse with per-IP and per-pubkey rate limits.
# rate_limiting:
#   enabled: true
#
#   # Per-IP limits (for unauthenticated requests)
#   ip:
#     download:
#       requests: 100      # Max blob downloads per window
#       window: "1m"       # Time window
#     upload:
#       requests: 10       # Max uploads per window
#       window: "1m"
#     general:
#       requests: 60       # All other requests
#       window: "1m"
#
#   # Per-pubkey limits (for authenticated requests)
#   pubkey:
#     download:
#       requests: 200
#       window: "1m"
#     upload:
#       requests: 30
#       window: "1m"
#     general:
#       requests: 120
#       window: "1m"
#
#   # Bandwidth limits
#   bandwidth:
#     download_mb_per_minute: 100    # Max MB downloaded per minute
#     upload_mb_per_minute: 50       # Max MB uploaded per minute
#
#   # Pubkeys exempt from rate limiting
#   whitelisted_pubkeys:
#     - "abc123..."

# Video transcoding configuration (optional)
# Configure hardware acceleration for video transcoding.
# transcoding:
#   work_dir: "/tmp/blossom-transcode"  # Directory for temporary files
#   ffmpeg_path: ""                      # Auto-detect if empty
#
#   # Hardware acceleration settings
#   hwaccel:
#     # Type of hardware acceleration to use
#     # Options: "none" (software), "nvenc" (NVIDIA), "qsv" (Intel), "vaapi" (AMD/Intel Linux), "auto"
#     # Default: "none"
#     type: "none"
#
#     # Device path for VAAPI (only used when type is "vaapi")
#     # device: "/dev/dri/renderD128"
#
#     # Encoder preset (varies by encoder)
#     # - NVENC: p1-p7 (p1=fastest, p7=highest quality), default: p4
#     # - QSV: veryfast, faster, fast, medium, slow, slower, veryslow
#     # - libx264: ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow
#     # preset: "veryfast"
#
#     # Look-ahead frames for NVENC (improves quality, increases memory usage)
#     # look_ahead: 0
#
#   # Example: NVIDIA GPU encoding
#   # hwaccel:
#   #   type: "nvenc"
#   #   preset: "p4"      # Balanced speed/quality
#   #   look_ahead: 20    # Higher quality B-frame decisions
#
#   # Example: Intel Quick Sync Video
#   # hwaccel:
#   #   type: "qsv"
#   #   preset: "medium"
#
#   # Example: VAAPI (AMD GPU or Intel on Linux)
#   # hwaccel:
#   #   type: "vaapi"
#   #   device: "/dev/dri/renderD128"

# Federation configuration (optional)
# Enable Nostr-based cross-server blob discovery and mirroring.
# Uses kind 1063 (NIP-94 file metadata) and kind 10063 (BUD-03 server list) events.
# federation:
#   enabled: true
#
#   # Federation mode:
#   # - "publish": Only publish blob events to relays
#   # - "subscribe": Only subscribe to events from relays
#   # - "both": Full federation (publish and subscribe)
#   mode: "both"
#
#   # Server's Nostr private key (nsec or hex format)
#   # Used to sign published events. Generate with: npx nostr-tools keygen
#   server_nsec: ${FEDERATION_NSEC}
#
#   # Nostr relays to connect to for federation
#   relay_urls:
#     - "wss://relay.damus.io"
#     - "wss://nos.lol"
#     - "wss://relay.nostr.band"
#
#   # Auto-mirror popular blobs from other servers
#   # When enabled, blobs referenced by multiple users are automatically mirrored locally
#   auto_mirror: true
#
#   # Minimum number of user references before auto-mirroring a blob
#   # Higher values reduce storage but may miss less popular content
#   mirror_min_refs: 2
#
#   # Number of worker goroutines for async publishing/mirroring
#   worker_count: 4
#
#   # Number of events to process in each batch
#   batch_size: 50
#
#   # Retry settings for failed operations
#   retry_attempts: 3
#   retry_delay: "5s"

# Log level, adjust accordingly.
log_level: "TRACE"

# Address where server will be listening.
api_addr: "0.0.0.0:8000"

# URL that will be used as the base for the URL to serve files.
#
# This setting is meant to be tweaked if you are running the server
# behind a reverse proxy (like nginx) and you want a subdomain.
# You could set it to: `https://my.domain.com` and then the files
# would be served at `https://my.domain.com/<hash>`
cdn_url: "http://0.0.0.0:8000"

# Admin pubkey
admin_pubkey: "509f37d850fa007227688f2d897e8e8efb6af9a4b2bd636bbd74349f9f2c6d89"

# Limit the size of files that can be uploaded, specified in bytes.
# Default value of 2MB
max_upload_size_bytes: 2097152

# Control the behavior of the Blossom server.
# Available actions:
# - 'ALLOW'
# - 'DENY'
#
# Available resources:
# - 'UPLOAD': upload a file to the server
# - 'GET': get a file from the server
# - 'DELETE': delete a file from the server
# - 'LIST': list the files of a pubkey
# - 'MIRROR': upload a file from another Blossom server
#
# Available pubkey options:
# - 'ALL': rule applies to any pubkey
# - '<specific-pubkey>': rule applies to only one pubkey
access_control_rules:
  - action: "ALLOW"
    pubkey: "ALL"
    resource: "UPLOAD"
  - action: "ALLOW"
    pubkey: "ALL"
    resource: "GET"

# Control the type of files that are accepted by the server.
# For the supported types, check: https://github.com/gabriel-vasile/mimetype/blob/master/supported_mimes.md
# 
# To allow any mime-type, only set one rule:
# - *
allowed_mime_types:
  - image/jpeg
  - image/png
